app = "meteoras-console-api"
primary_region = "sjc"

[build]

[env]
  PORT = "8787"
  # State persists in Supabase (set via secrets), so no volume is required.
  SUPABASE_STATE_TABLE = "meteoras_console_state"
  SUPABASE_STATE_ROW_ID = "production"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
